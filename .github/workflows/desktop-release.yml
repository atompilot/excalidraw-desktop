name: Desktop App Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop-app/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('desktop-app/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Node dependencies
        run: yarn install

      - name: Import Apple certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$MACOS_CERTIFICATE" | base64 --decode > $CERTIFICATE_PATH

          # Create and configure keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate with ACL for codesign
          security import $CERTIFICATE_PATH -P "$MACOS_CERTIFICATE_PWD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Add to keychain search list (critical for codesign to find it)
          security list-keychain -d user -s $KEYCHAIN_PATH

          rm $CERTIFICATE_PATH

          # Export for cleanup step
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

          # Verify certificate is accessible
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Build Universal Binary .dmg
        env:
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Splat AI INC (D9V25D8RBJ)"
          APPLE_ID: ${{ secrets.NOTARIZE_APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.NOTARIZE_APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: "D9V25D8RBJ"
        run: |
          cd desktop-app
          yarn exec tauri build --bundles dmg

      - name: Prepare release artifact
        id: artifact
        run: |
          if [[ "$GITHUB_REF" == refs/tags/desktop-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/desktop-v}"
          else
            VERSION=$(jq -r '.version' desktop-app/src-tauri/tauri.conf.json)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          DMG_SOURCE=$(find desktop-app/src-tauri/target -path "*/bundle/dmg/*.dmg" | head -1)
          DMG_DEST="Excalidraw_${VERSION}_universal.dmg"
          cp "$DMG_SOURCE" "$DMG_DEST"
          echo "dmg_path=$DMG_DEST" >> $GITHUB_OUTPUT

      - name: Create Draft Release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Excalidraw Desktop v${{ steps.artifact.outputs.version }}"
          files: ${{ steps.artifact.outputs.dmg_path }}
          generate_release_notes: true

      - name: Upload artifact (for manual runs)
        if: "!startsWith(github.ref, 'refs/tags/desktop-v')"
        uses: actions/upload-artifact@v4
        with:
          name: Excalidraw-${{ steps.artifact.outputs.version }}-universal.dmg
          path: ${{ steps.artifact.outputs.dmg_path }}

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
